<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GeoDecoder Pro 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --euro: #60a5fa;
            --mong: #fbbf24;
            --negro: #fb7185;
            --all: #34d399;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: #f8fafc;
            margin: 0;
            min-height: 100vh;
        }

        header {
            padding: 25px;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Хмарочос блоки */
        .pool {
            background: var(--glass);
            border: 2px dashed rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 25px;
            min-height: 80px;
        }

        .word {
            background: white;
            color: #1e293b;
            padding: 12px 18px;
            border-radius: 12px;
            font-weight: 700;
            cursor: grab;
            box-shadow: 0 10px 15px rgba(0,0,0,0.3);
            user-select: none;
        }

        .skyscraper .floor {
            background: var(--glass);
            border-radius: 18px;
            padding: 35px 15px 15px;
            min-height: 60px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .floor::before {
            content: attr(data-label);
            position: absolute;
            top: 10px;
            left: 15px;
            font-size: 0.7rem;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.4);
        }

        .euro-f { border-left: 6px solid var(--euro); }
        .mong-f { border-left: 6px solid var(--mong); }
        .negro-f { border-left: 6px solid var(--negro); }
        .all-f { border-left: 6px solid var(--all); }

        .correct { background: #10b981 !important; color: white !important; }
        .wrong { background: #ef4444 !important; color: white !important; }

        /* Бліц-квест стилі */
        .quiz-card {
            background: var(--glass);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .quiz-option {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: 0.3s;
        }

        /* Модалка */
        #win-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .hidden { display: none; }
        .btn-next { background: var(--primary); color: white; padding: 15px 30px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; margin-top: 20px;}
    </style>
</head>
<body>

<header>
    <h1>GEO-DECODER v2.6</h1>
</header>

<!-- Секція 1: Хмарочос -->
<div class="container" id="game-1">
    <div class="pool sortable-list" id="wordPool">
        <div class="word" data-type="mong">Епікантус</div>
        <div class="word" data-type="euro">Вузький ніс</div>
        <div class="word" data-type="negro">Меланін</div>
        <div class="word" data-type="all">Мова</div>
        <div class="word" data-type="mong">Плоске обличчя</div>
        <div class="word" data-type="all">Мрії</div>
        <div class="word" data-type="euro">М'яке волосся</div>
        <div class="word" data-type="all">Творчість</div>
        <div class="word" data-type="negro">Темна шкіра</div>
    </div>

    <div class="skyscraper">
        <div class="floor euro-f sortable-list" id="euro" data-label="Європеоїдна"></div>
        <div class="floor mong-f sortable-list" id="mong" data-label="Монголоїдна"></div>
        <div class="floor negro-f sortable-list" id="negro" data-label="Негроїдна"></div>
        <div class="floor all-f sortable-list" id="all" data-label="Спільне для всіх"></div>
    </div>
</div>

<!-- Секція 2: Бліц-квест -->
<div class="container hidden" id="game-2">
    <div class="quiz-card">
        <h2 id="quiz-q">Завантаження...</h2>
        <div id="quiz-options"></div>
        <p id="quiz-feedback" style="margin-top: 15px; font-weight: bold;"></p>
    </div>
</div>

<!-- Модалка перемоги -->
<div id="win-modal">
    <h2 style="font-size: 3rem; color: var(--all);">УСПІХ! 🎉</h2>
    <p style="font-size: 1.2rem; text-align: center;">Ти розшифрував код рас. Готовий до фінального Бліц-квесту?</p>
    <button class="btn-next" onclick="startQuiz()">ТАК, ПОЇХАЛИ! ⚡</button>
</div>

<script>
    // Логіка Хмарочоса
    const totalWords = 9;
    const lists = document.querySelectorAll('.sortable-list');
    lists.forEach(list => {
        new Sortable(list, {
            group: 'races',
            animation: 200,
            onAdd: (evt) => {
                const item = evt.item;
                const targetId = evt.to.id;
                const correctType = item.getAttribute('data-type');
                if (targetId === 'wordPool') { item.classList.remove('correct', 'wrong'); }
                else if (targetId === correctType) { item.classList.add('correct'); item.classList.remove('wrong'); }
                else { item.classList.add('wrong'); item.classList.remove('correct'); }
                
                if (document.querySelectorAll('.correct').length === totalWords) {
                    setTimeout(() => { document.getElementById('win-modal').style.display = 'flex'; }, 500);
                }
            }
        });
    });

    // Логіка Бліц-квесту
    const quizData = [
        { q: "Яка раса найкраще захищена від сонячної радіації?", a: ["Європеоїдна", "Негроїдна", "Монголоїдна"], c: 1 },
        { q: "Що є спільним фундаментом для всіх людей?", a: ["Колір очей", "Мрії та творчість", "Форма носа"], c: 1 },
        { q: "Навіщо європеоїдам вузький ніс?", a: ["Для краси", "Щоб зігрівати повітря", "Щоб краще бачити"], c: 1 },
        { q: "Яка ознака захищає очі від пилу степів?", a: ["Довгі вії", "Епікантус", "Темний колір"], c: 1 }
    ];

    let currentQ = 0;

    function startQuiz() {
        document.getElementById('win-modal').style.display = 'none';
        document.getElementById('game-1').classList.add('hidden');
        document.getElementById('game-2').classList.remove('hidden');
        renderQuiz();
    }

    function renderQuiz() {
        const q = quizData[currentQ];
        document.getElementById('quiz-q').innerText = q.q;
        const optDiv = document.getElementById('quiz-options');
        optDiv.innerHTML = '';
        document.getElementById('quiz-feedback').innerText = '';

        q.a.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.className = 'quiz-option';
            btn.innerText = opt;
            btn.onclick = () => checkQuiz(i);
            optDiv.appendChild(btn);
        });
    }

    function checkQuiz(idx) {
        const btns = document.querySelectorAll('.quiz-option');
        if (idx === quizData[currentQ].c) {
            btns[idx].style.background = '#10b981';
            document.getElementById('quiz-feedback').innerText = "Правильно! 🌟";
            setTimeout(() => {
                currentQ++;
                if (currentQ < quizData.length) renderQuiz();
                else {
                    document.getElementById('quiz-q').innerText = "Квест пройдено! Ти справжній майстер географії! 🌍";
                    document.getElementById('quiz-options').innerHTML = '';
                }
            }, 1500);
        } else {
            btns[idx].style.background = '#ef4444';
            document.getElementById('quiz-feedback').innerText = "Спробуй ще раз! 🤔";
            if (navigator.vibrate) navigator.vibrate(200);
        }
    }
</script>

</body>
</html>
